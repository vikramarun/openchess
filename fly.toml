# Fly.io config for the OpenChess game server. Deploy with:
#
#   fly launch --no-deploy --copy-config --ha=false --name openchess   # first time
#   fly postgres create --name openchess-db                            # managed Postgres
#   fly postgres attach openchess-db                                   # sets DATABASE_URL
#   fly secrets set RPC_URL=... ESCROW_ADDR=0x... ORACLE_KEY=0x...      # on-chain (wagering)
#   fly deploy --ha=false                                              # ALWAYS --ha=false
#   fly scale count 1                                                  # exactly ONE instance
#   fly machines list                                                  # verify: one machine
#
# IMPORTANT: this is a single-node, stateful server (live games, lobby, rooms,
# launch tokens, and SIWE sessions are all in-process memory). It MUST run
# exactly ONE machine. Fly defaults to a 2-machine HA pair, which silently
# breaks everything (each request hits a different machine's memory: offers
# vanish, games won't start, sign-in doesn't stick). So:
#   - deploy with  --ha=false  EVERY time (a plain `fly deploy` re-adds the HA
#     machine),
#   - keep `fly scale count 1`, and
#   - check `fly machines list` after each deploy.
# (True HA needs the Redis-backed session/lobby + sharded-rooms work — see
# PRODUCTION.md — until then, one machine only.)

app = "openchess"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  BIND = "0.0.0.0:8080"
  # The canonical frontend host. SIWE_DOMAIN is host-only (must equal the browser
  # URL exactly); WEB_ORIGIN is the full origin (CORS). www.openchess.ai must
  # redirect to the apex so the origin is always this one.
  SIWE_DOMAIN = "openchess.ai"
  WEB_ORIGIN = "https://openchess.ai"
  # Chain used for SIWE + escrow. Only matters once you enable wagering — flip to
  # "84532" when you wager on Base Sepolia. (8453 = Base mainnet.)
  SIWE_CHAIN_ID = "8453"
  # REQUIRE_ONCHAIN is intentionally OFF while testing (casual play only). Turn it
  # on ("1") only once DATABASE_URL + RPC_URL + ESCROW_ADDR + ORACLE_KEY are all
  # set — it fails the boot otherwise (see main.rs REQUIRE_ONCHAIN).
  # REQUIRE_ONCHAIN = "1"

# Secrets (NOT in this file — set via `fly secrets set` / `fly postgres attach`):
#   DATABASE_URL   (from `fly postgres attach`)
#   RPC_URL        (Base RPC endpoint)
#   ESCROW_ADDR    (deployed ChessEscrow address)
#   ORACLE_KEY     (oracle signer key — use a KMS/HSM in real production)

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  # WebSockets ride over the same HTTP service (Fly proxies WS transparently).

  [[http_service.checks]]
    method = "get"
    path = "/ready"
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
